<nav class="navbar">
    <div class="navbar-container">
        <!-- Logo as Home Button -->
        <a routerLink="/" class="brand">
            <img [src]="logoPath()" alt="PARABOX Home" class="logo">
        </a>

        <!-- Navigation Links -->
        <div class="nav-links">
            @if (currentUser()) {
            <a routerLink="/cliente" class="nav-link user-menu">
                <span class="user-avatar" aria-hidden="true">{{ initials() }}</span>
                <span class="user-name">{{ displayName() }}</span>
            </a>
            } @else {
            <a routerLink="/login" class="nav-link login-btn">Iniciar sesión</a>
            }
            <a routerLink="/cart" class="nav-link">
                Carrito
                @if (cartService.itemCount() > 0) {
                <span class="cart-badge">
                    {{ cartService.itemCount() }}
                </span>
                }
            </a>
        </div>

        <!-- Theme Toggle -->
        <button class="theme-toggle" type="button" (click)="toggleTheme()"
            [attr.aria-label]="isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
            [attr.aria-pressed]="isDark()">
            @if (isDark()) {
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path
                    d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z" />
            </svg>
            } @else {
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path
                    d="M12 7a5 5 0 1 0 0 10A5 5 0 0 0 12 7zm0-5a1 1 0 0 1 1 1v2a1 1 0 0 1-2 0V3a1 1 0 0 1 1-1zm0 16a1 1 0 0 1 1 1v2a1 1 0 0 1-2 0v-2a1 1 0 0 1 1-1zm9-8a1 1 0 0 1 0 2h-2a1 1 0 0 1 0-2h2zM5 12a1 1 0 0 1-1 1H2a1 1 0 0 1 0-2h2a1 1 0 0 1 1 1zm11.95-6.364a1 1 0 0 1 0 1.414l-1.414 1.414a1 1 0 1 1-1.414-1.414l1.414-1.414a1 1 0 0 1 1.414 0zM7.464 16.95a1 1 0 0 1 0 1.414L6.05 19.778a1 1 0 1 1-1.414-1.414l1.414-1.414a1 1 0 0 1 1.414 0zM19.778 17.95a1 1 0 0 1-1.414 1.414L16.95 17.95a1 1 0 1 1 1.414-1.414l1.414 1.414zM7.464 7.05a1 1 0 0 1-1.414 0L4.636 5.636A1 1 0 0 1 6.05 4.222l1.414 1.414a1 1 0 0 1 0 1.414z" />
            </svg>
            }
        </button>
    </div>
</nav>
